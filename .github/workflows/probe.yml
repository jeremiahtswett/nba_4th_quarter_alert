# Temporary diagnostic: which scoreboard sources are reachable from a
# GitHub-hosted runner? Deleted once the data-source decision is made.
name: Feed probe

on: workflow_dispatch

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe feeds
        run: |
          python - <<'EOF'
          import json, urllib.request

          BROWSER = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
              "Accept": "application/json",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://www.nba.com/",
          }
          FULL = dict(BROWSER, **{
              "Sec-Ch-Ua": '"Not/A)Brand";v="8", "Chromium";v="126", "Google Chrome";v="126"',
              "Sec-Ch-Ua-Mobile": "?0",
              "Sec-Ch-Ua-Platform": '"Windows"',
              "Sec-Fetch-Dest": "empty",
              "Sec-Fetch-Mode": "cors",
              "Sec-Fetch-Site": "same-site",
              "Origin": "https://www.nba.com",
          })

          def probe(label, url, headers):
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read()
                      try:
                          json.loads(body)
                          print(f"{label}: OK status={r.status} json=yes bytes={len(body)}")
                      except ValueError:
                          print(f"{label}: status={r.status} json=NO body={body[:80]!r}")
              except Exception as e:
                  print(f"{label}: FAILED {type(e).__name__}: {str(e)[:100]}")

          NBA = "https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json"
          probe("nba-cdn basic-headers", NBA, BROWSER)
          probe("nba-cdn full-browser-headers", NBA, FULL)
          probe("nba-static-alt", "https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json?ts=1", FULL)
          probe("espn", "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard", {"User-Agent": BROWSER["User-Agent"], "Accept": "application/json"})
          probe("espn bare", "https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard", {})
          EOF
